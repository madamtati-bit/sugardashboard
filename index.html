<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SugarDashboard - AI Project Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .progress-bar { transition: width 1s ease-in-out; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">
    <aside class="w-64 bg-slate-900 text-white flex flex-col p-6 hidden md:flex">
        <div class="flex items-center gap-3 mb-10">
            <i class="fas fa-cube text-2xl text-pink-400"></i>
            <h1 class="text-xl font-bold">SugarDash</h1>
        </div>
        <nav class="flex-1">
            <ul class="space-y-4">
                <li><a href="#" class="flex items-center gap-3 text-white bg-slate-800 p-3 rounded-lg"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="#" class="flex items-center gap-3 text-slate-400 hover:text-white p-3"><i class="fas fa-tasks"></i> Proyek</a></li>
                <li><a href="#" class="flex items-center gap-3 text-slate-400 hover:text-white p-3"><i class="fas fa-robot"></i> Analisis AI</a></li>
            </ul>
        </nav>
    </aside>
    <main class="flex-1 overflow-y-auto p-8">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-2xl font-bold text-slate-800">Realisasi Progress Pekerjaan</h2>
                <p class="text-slate-500">Analisis Otomatis oleh AI</p>
            </div>
            <img src="https://ui-avatars.com/api/?name=Admin&background=ec4899&color=fff" class="w-10 h-10 rounded-full shadow" alt="User">
        </header>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="glass-card p-6 rounded-xl shadow-sm border-l-4 border-pink-500">
                <p class="text-sm text-gray-500">Total Proyek</p>
                <h3 class="text-2xl font-bold text-gray-800">12</h3>
            </div>
            <div class="glass-card p-6 rounded-xl shadow-sm border-l-4 border-green-500">
                <p class="text-sm text-gray-500">Selesai</p>
                <h3 class="text-2xl font-bold text-gray-800">8</h3>
            </div>
            <div class="glass-card p-6 rounded-xl shadow-sm border-l-4 border-yellow-500">
                <p class="text-sm text-gray-500">Berjalan</p>
                <h3 class="text-2xl font-bold text-gray-800">3</h3>
            </div>
            <div class="glass-card p-6 rounded-xl shadow-sm border-l-4 border-red-500">
                <p class="text-sm text-gray-500">Terlambat</p>
                <h3 class="text-2xl font-bold text-gray-800">1</h3>
            </div>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 glass-card rounded-xl shadow-sm p-6">
                <h3 class="text-lg font-bold text-gray-800 mb-4">Progress Saat Ini</h3>
                <div class="space-y-4" id="projectList"></div>
            </div>
            <div class="glass-card rounded-xl shadow-sm p-6 border-t-4 border-indigo-500">
                <div class="flex items-center gap-3 mb-4">
                    <div class="bg-indigo-100 p-2 rounded-full text-indigo-600"><i class="fas fa-robot"></i></div>
                    <h3 class="text-lg font-bold text-gray-800">Analisis AI</h3>
                </div>
                <div id="aiAnalysisContent" class="text-sm text-gray-600 space-y-3">
                    <p class="text-center text-gray-400 py-10">Memuat...</p>
                </div>
                <button onclick="runAIAnalysis()" class="mt-6 w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-lg transition">
                    Analisis Ulang
                </button>
            </div>
        </div>
    </main>
    <script>
        const projects = [
            { name: "Redesign Website UI", progress: 90, status: "on-track" },
            { name: "Backend API Integration", progress: 45, status: "delayed" },
            { name: "Mobile App Development", progress: 75, status: "on-track" },
            { name: "Database Migration", progress: 20, status: "at-risk" }
        ];
        function renderProjects() {
            const c = document.getElementById('projectList'); c.innerHTML = '';
            projects.forEach(p => {
                let color = 'bg-blue-500';
                if(p.status === 'delayed') color = 'bg-red-500';
                if(p.status === 'at-risk') color = 'bg-yellow-500';
                c.innerHTML += `<div class="bg-gray-50 p-4 rounded-lg">
                    <div class="flex justify-between mb-2"><h4 class="font-semibold text-gray-700">${p.name}</h4><span class="text-xs px-2 py-1 rounded-full bg-gray-200">${p.progress}%</span></div>
                    <div class="w-full bg-gray-200 rounded-full h-2.5"><div class="progress-bar ${color} h-2.5 rounded-full" style="width: ${p.progress}%"></div></div>
                </div>`;
            });
        }
        function runAIAnalysis() {
            const c = document.getElementById('aiAnalysisContent');
            c.innerHTML = `<p class="text-indigo-500 font-semibold">Menganalisis data proyek...</p>`;
            setTimeout(() => {
                const risk = projects.filter(p => p.status === 'delayed' || p.status === 'at-risk');
                let html = risk.length > 0 
                    ? `<div class="p-3 bg-red-50 border-l-4 border-red-500 text-red-700 rounded"><strong>Peringatan!</strong><br>Terdeteksi ${risk.length} proyek bermasalah. Saran: Re-alokasi tim ke proyek "${risk[0].name}".</div>`
                    : `<div class="p-3 bg-green-50 border-l-4 border-green-500 text-green-700 rounded">Semua proyek berjalan lancar.</div>`;
                c.innerHTML = html;
            }, 1000);
        }
        document.addEventListener('DOMContentLoaded', () => { renderProjects(); runAIAnalysis(); });
    </script>
</body>
</html>
